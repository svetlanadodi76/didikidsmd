<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Admin — DiDiKidsMD</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:Georgia,serif;background:#faf6f0;color:#3a1f2d;min-height:100vh}
  :root{--plum:#5c2d4a;--gold:#c9a96e;--cream:#faf6f0;--soft:#f0e8d8;--muted:#7a5566}

  /* LOGIN */
  #loginScreen{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:1rem}
  .login-card{background:#fff;border-radius:12px;padding:2.5rem;width:100%;max-width:380px;box-shadow:0 4px 24px rgba(92,45,74,.12)}
  .login-card h1{color:var(--plum);font-size:1.5rem;font-weight:400;text-align:center;margin-bottom:.3rem}
  .login-card p{color:var(--muted);font-size:.85rem;text-align:center;margin-bottom:2rem}
  .form-group{margin-bottom:1.2rem}
  .form-group label{display:block;font-size:.8rem;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-bottom:.4rem}
  .form-group input{width:100%;padding:.75rem 1rem;border:1.5px solid #e5d8c4;border-radius:8px;font-size:.95rem;background:#faf6f0;color:#3a1f2d;outline:none;transition:border-color .2s}
  .form-group input:focus{border-color:var(--gold)}
  .btn-primary{width:100%;padding:.85rem;background:var(--plum);color:#fff;border:none;border-radius:8px;font-size:1rem;cursor:pointer;transition:opacity .2s}
  .btn-primary:hover{opacity:.88}
  .login-error{color:#c0392b;font-size:.85rem;text-align:center;margin-top:.8rem;min-height:1.2rem}

  /* DASHBOARD */
  #dashboard{display:none}
  header{background:var(--plum);padding:1rem 2rem;display:flex;align-items:center;justify-content:space-between}
  header h1{color:#faf6f0;font-size:1.2rem;font-weight:400;letter-spacing:.05em}
  header span{color:var(--gold);font-size:.8rem}
  .logout-btn{background:transparent;border:1px solid rgba(201,169,110,.4);color:var(--gold);padding:.4rem 1rem;border-radius:6px;cursor:pointer;font-size:.85rem;transition:all .2s}
  .logout-btn:hover{background:rgba(201,169,110,.15)}

  .dashboard-body{padding:1.5rem 2rem;max-width:1200px;margin:0 auto}

  /* STATS */
  .stats{display:flex;gap:1rem;margin-bottom:1.5rem;flex-wrap:wrap}
  .stat-card{background:#fff;border-radius:10px;padding:1rem 1.5rem;flex:1;min-width:140px;border-top:3px solid var(--gold)}
  .stat-card .num{font-size:1.8rem;color:var(--plum);font-weight:600}
  .stat-card .lbl{font-size:.78rem;color:var(--muted);text-transform:uppercase;letter-spacing:.08em}

  /* FILTERS */
  .filters{display:flex;gap:.5rem;margin-bottom:1.2rem;flex-wrap:wrap}
  .filter-btn{padding:.45rem 1.1rem;border-radius:20px;border:1.5px solid #e5d8c4;background:#fff;color:var(--muted);font-size:.85rem;cursor:pointer;transition:all .2s}
  .filter-btn.active{background:var(--plum);color:#fff;border-color:var(--plum)}

  /* TABLE */
  .table-wrap{background:#fff;border-radius:12px;overflow:hidden;box-shadow:0 2px 12px rgba(92,45,74,.07);overflow-x:auto}
  table{width:100%;border-collapse:collapse;min-width:700px}
  th{background:var(--soft);color:var(--plum);font-size:.75rem;letter-spacing:.1em;text-transform:uppercase;padding:.9rem 1rem;text-align:left;font-weight:600}
  td{padding:.85rem 1rem;border-bottom:1px solid #f0e8d8;font-size:.9rem;vertical-align:middle}
  tr:last-child td{border-bottom:none}
  tr:hover td{background:#fdf9f5}

  /* STATUS BADGE */
  .badge{display:inline-block;padding:.25rem .75rem;border-radius:20px;font-size:.75rem;font-weight:600;letter-spacing:.05em}
  .badge-nou{background:#fff3cd;color:#856404}
  .badge-confirmat{background:#d1e7dd;color:#0f5132}
  .badge-anulat{background:#f8d7da;color:#842029}

  /* ACTION BUTTONS */
  .actions{display:flex;gap:.4rem;flex-wrap:wrap}
  .btn-confirm{background:#0f5132;color:#fff;border:none;padding:.35rem .85rem;border-radius:6px;font-size:.8rem;cursor:pointer;transition:opacity .2s}
  .btn-confirm:hover{opacity:.85}
  .btn-cancel{background:#842029;color:#fff;border:none;padding:.35rem .85rem;border-radius:6px;font-size:.8rem;cursor:pointer;transition:opacity .2s}
  .btn-cancel:hover{opacity:.85}
  .btn-edit{background:var(--soft);color:var(--plum);border:1.5px solid var(--gold);padding:.35rem .85rem;border-radius:6px;font-size:.8rem;cursor:pointer;transition:all .2s}
  .btn-edit:hover{background:var(--gold);color:#fff}

  /* EMPTY */
  .empty{text-align:center;padding:3rem;color:var(--muted);font-style:italic}

  /* MODAL */
  .modal-overlay{display:none;position:fixed;inset:0;background:rgba(58,31,45,.5);z-index:100;align-items:center;justify-content:center;padding:1rem}
  .modal-overlay.open{display:flex}
  .modal{background:#fff;border-radius:14px;padding:2rem;width:100%;max-width:480px;max-height:90vh;overflow-y:auto}
  .modal h2{color:var(--plum);font-size:1.15rem;font-weight:400;margin-bottom:1.5rem}
  .modal-field{margin-bottom:1rem}
  .modal-field label{display:block;font-size:.78rem;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);margin-bottom:.35rem}
  .modal-field input,.modal-field textarea,.modal-field select{width:100%;padding:.65rem .9rem;border:1.5px solid #e5d8c4;border-radius:7px;font-size:.9rem;background:#faf6f0;color:#3a1f2d;outline:none;font-family:inherit;transition:border-color .2s}
  .modal-field input:focus,.modal-field textarea:focus,.modal-field select:focus{border-color:var(--gold)}
  .modal-field textarea{resize:vertical;min-height:70px}
  .modal-field input[readonly]{background:#f0e8d8;color:var(--muted);cursor:not-allowed}
  .modal-actions{display:flex;gap:.75rem;justify-content:flex-end;margin-top:1.5rem}
  .btn-secondary{padding:.65rem 1.4rem;border-radius:8px;border:1.5px solid #e5d8c4;background:#fff;color:var(--muted);cursor:pointer;font-size:.9rem}
  .btn-save{padding:.65rem 1.4rem;border-radius:8px;background:var(--plum);color:#fff;border:none;cursor:pointer;font-size:.9rem;transition:opacity .2s}
  .btn-save:hover{opacity:.88}
  .nota-section{background:var(--soft);border-radius:8px;padding:1rem;margin-top:1rem;border-left:3px solid var(--gold)}
  .nota-section p{font-size:.78rem;color:var(--muted);margin-bottom:.5rem}

  /* TOAST */
  #toast{position:fixed;bottom:2rem;right:2rem;background:#3a1f2d;color:#fff;padding:.9rem 1.5rem;border-radius:10px;font-size:.9rem;opacity:0;transform:translateY(10px);transition:all .3s;pointer-events:none;z-index:200}
  #toast.show{opacity:1;transform:translateY(0)}
  #toast.success{background:#0f5132}
  #toast.error{background:#842029}

  /* LOADING */
  .loading{text-align:center;padding:3rem;color:var(--muted)}
  .spinner{width:32px;height:32px;border:3px solid #e5d8c4;border-top-color:var(--plum);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 1rem}
  @keyframes spin{to{transform:rotate(360deg)}}

  @media(max-width:600px){
    .dashboard-body{padding:1rem}
    header{padding:.8rem 1rem}
    .stats{gap:.6rem}
  }
</style>
</head>
<body>

<!-- LOGIN -->
<div id="loginScreen">
  <div class="login-card">
    <h1>DiDiKidsMD</h1>
    <p>Panou administrare comenzi</p>
    <div class="form-group">
      <label>Email</label>
      <input type="email" id="loginEmail" placeholder="admin@didikidsmd.md" autocomplete="username"/>
    </div>
    <div class="form-group">
      <label>Parolă</label>
      <input type="password" id="loginPassword" placeholder="••••••••" autocomplete="current-password"/>
    </div>
    <button class="btn-primary" onclick="doLogin()">Intră în panou</button>
    <div class="login-error" id="loginError"></div>
  </div>
</div>

<!-- DASHBOARD -->
<div id="dashboard">
  <header>
    <div>
      <h1>DiDiKidsMD — Comenzi</h1>
      <span id="headerDate"></span>
    </div>
    <button class="logout-btn" onclick="doLogout()">Ieșire</button>
  </header>
  <div class="dashboard-body">
    <div class="stats" id="stats"></div>
    <div class="filters" id="filters">
      <button class="filter-btn active" data-status="toate" onclick="setFilter(this)">Toate</button>
      <button class="filter-btn" data-status="Nou" onclick="setFilter(this)">🟡 Noi</button>
      <button class="filter-btn" data-status="Confirmat" onclick="setFilter(this)">🟢 Confirmate</button>
      <button class="filter-btn" data-status="Anulat" onclick="setFilter(this)">🔴 Anulate</button>
    </div>
    <div class="table-wrap" id="tableWrap">
      <div class="loading"><div class="spinner"></div>Se încarcă comenzile...</div>
    </div>
  </div>
</div>

<!-- EDIT MODAL -->
<div class="modal-overlay" id="editModal">
  <div class="modal">
    <h2>✏️ Editează comanda</h2>
    <div class="modal-field">
      <label>Client</label>
      <input type="text" id="eNume" readonly/>
    </div>
    <div class="modal-field">
      <label>Telefon</label>
      <input type="text" id="eTelefon" readonly/>
    </div>
    <div class="modal-field">
      <label>Email</label>
      <input type="text" id="eEmail" readonly/>
    </div>
    <div class="modal-field">
      <label>Produse comandate</label>
      <textarea id="eProduse" rows="3"></textarea>
    </div>
    <div class="modal-field">
      <label>Metodă livrare</label>
      <select id="eLivrare">
        <option>Curier</option>
        <option>Poșta Moldovei</option>
      </select>
    </div>
    <div class="modal-field">
      <label>Localitate</label>
      <input type="text" id="eLocalitate"/>
    </div>
    <div class="modal-field">
      <label>Adresă</label>
      <input type="text" id="eAdresa"/>
    </div>
    <div class="nota-section">
      <p>📝 Notă pentru client (opțional — apare în emailul de confirmare)</p>
      <textarea id="eNota" placeholder="ex: Comanda va fi expediată mâine. Prețul total: 450 MDL." rows="2"></textarea>
    </div>
    <div class="modal-actions">
      <button class="btn-secondary" onclick="closeModal()">Anulează</button>
      <button class="btn-save" onclick="saveEdit()">Salvează</button>
    </div>
  </div>
</div>

<!-- CONFIRM MODAL -->
<div class="modal-overlay" id="confirmModal">
  <div class="modal" style="max-width:360px;text-align:center">
    <p style="font-size:2rem;margin-bottom:.5rem" id="confirmIcon">✅</p>
    <h2 id="confirmTitle" style="margin-bottom:1rem">Confirmi acțiunea?</h2>
    <p style="color:var(--muted);font-size:.9rem;margin-bottom:1.5rem" id="confirmText"></p>
    <div class="modal-actions" style="justify-content:center">
      <button class="btn-secondary" onclick="closeConfirmModal()">Nu</button>
      <button class="btn-save" id="confirmBtn" onclick="executeAction()">Da, confirmă</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
let TOKEN = localStorage.getItem('didi_admin_token') || '';
let allOrders = [];
let currentFilter = 'toate';
let pendingAction = null; // { rowIndex, action, order }

/* ── AUTH ── */
async function doLogin() {
  const email    = document.getElementById('loginEmail').value.trim();
  const password = document.getElementById('loginPassword').value;
  const errEl    = document.getElementById('loginError');
  errEl.textContent = '';

  try {
    const res  = await fetch('/api/admin-login', {
      method:  'POST',
      headers: { 'Content-Type': 'application/json' },
      body:    JSON.stringify({ email, password }),
    });
    const data = await res.json();
    if (!res.ok) { errEl.textContent = data.error || 'Eroare'; return; }
    TOKEN = data.token;
    localStorage.setItem('didi_admin_token', TOKEN);
    showDashboard();
  } catch (e) {
    errEl.textContent = 'Eroare de conexiune';
  }
}

function doLogout() {
  TOKEN = '';
  localStorage.removeItem('didi_admin_token');
  document.getElementById('dashboard').style.display = 'none';
  document.getElementById('loginScreen').style.display = 'flex';
}

/* ── ENTER ON LOGIN ── */
document.addEventListener('keydown', e => {
  if (e.key === 'Enter' && document.getElementById('loginScreen').style.display !== 'none') doLogin();
});

/* ── DASHBOARD ── */
function showDashboard() {
  document.getElementById('loginScreen').style.display = 'none';
  document.getElementById('dashboard').style.display = 'block';
  document.getElementById('headerDate').textContent = new Date().toLocaleDateString('ro-MD', { weekday:'long', day:'numeric', month:'long' });
  loadOrders();
}

async function loadOrders() {
  document.getElementById('tableWrap').innerHTML = '<div class="loading"><div class="spinner"></div>Se încarcă comenzile...</div>';
  try {
    const res  = await fetch('/api/admin-orders', { headers: { 'Authorization': `Bearer ${TOKEN}` } });
    if (res.status === 401) { doLogout(); return; }
    const data = await res.json();
    allOrders  = (data.orders || []).reverse(); // newest first
    renderStats();
    renderTable();
  } catch (e) {
    document.getElementById('tableWrap').innerHTML = '<div class="empty">Eroare la încărcarea comenzilor.</div>';
  }
}

function renderStats() {
  const total     = allOrders.length;
  const noi       = allOrders.filter(o => o.status === 'Nou').length;
  const confirmate= allOrders.filter(o => o.status === 'Confirmat').length;
  const anulate   = allOrders.filter(o => o.status === 'Anulat').length;
  document.getElementById('stats').innerHTML = `
    <div class="stat-card"><div class="num">${total}</div><div class="lbl">Total comenzi</div></div>
    <div class="stat-card" style="border-top-color:#856404"><div class="num">${noi}</div><div class="lbl">Noi</div></div>
    <div class="stat-card" style="border-top-color:#0f5132"><div class="num">${confirmate}</div><div class="lbl">Confirmate</div></div>
    <div class="stat-card" style="border-top-color:#842029"><div class="num">${anulate}</div><div class="lbl">Anulate</div></div>
  `;
}

function setFilter(btn) {
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  currentFilter = btn.dataset.status;
  renderTable();
}

function renderTable() {
  const orders = currentFilter === 'toate'
    ? allOrders
    : allOrders.filter(o => o.status === currentFilter);

  if (!orders.length) {
    document.getElementById('tableWrap').innerHTML = '<div class="empty">Nicio comandă găsită.</div>';
    return;
  }

  const rows = orders.map(o => {
    const badge = o.status === 'Nou'
      ? `<span class="badge badge-nou">Nou</span>`
      : o.status === 'Confirmat'
        ? `<span class="badge badge-confirmat">Confirmat</span>`
        : `<span class="badge badge-anulat">Anulat</span>`;

    const actions = o.status === 'Nou' ? `
      <div class="actions">
        <button class="btn-confirm" onclick="askAction(${o.rowIndex},'confirm')">✅ Confirmă</button>
        <button class="btn-cancel"  onclick="askAction(${o.rowIndex},'cancel')">❌ Anulează</button>
        <button class="btn-edit"    onclick="openEdit(${o.rowIndex})">✏️ Editează</button>
      </div>` : '—';

    return `<tr>
      <td style="color:var(--muted);font-size:.8rem">${o.data}</td>
      <td><strong>${o.nume}</strong><br><span style="color:var(--muted);font-size:.8rem">${o.telefon}</span></td>
      <td style="font-size:.85rem;max-width:180px">${o.produse}</td>
      <td style="font-size:.85rem">${o.livrare}<br><span style="color:var(--muted);font-size:.78rem">${o.localitate}</span></td>
      <td>${badge}</td>
      <td>${actions}</td>
    </tr>`;
  }).join('');

  document.getElementById('tableWrap').innerHTML = `
    <table>
      <thead><tr>
        <th>Data</th><th>Client</th><th>Produse</th><th>Livrare</th><th>Status</th><th>Acțiuni</th>
      </tr></thead>
      <tbody>${rows}</tbody>
    </table>`;
}

/* ── CONFIRM MODAL ── */
function askAction(rowIndex, action) {
  const order = allOrders.find(o => o.rowIndex === rowIndex);
  if (!order) return;
  pendingAction = { rowIndex, action, order };

  const isConfirm = action === 'confirm';
  document.getElementById('confirmIcon').textContent  = isConfirm ? '✅' : '❌';
  document.getElementById('confirmTitle').textContent = isConfirm ? 'Confirmi comanda?' : 'Anulezi comanda?';
  document.getElementById('confirmText').textContent  = `${order.nume} — ${order.produse}`;
  document.getElementById('confirmBtn').textContent   = isConfirm ? 'Da, confirmă' : 'Da, anulează';
  document.getElementById('confirmBtn').style.background = isConfirm ? '#0f5132' : '#842029';
  document.getElementById('confirmModal').classList.add('open');
}

function closeConfirmModal() {
  pendingAction = null;
  document.getElementById('confirmModal').classList.remove('open');
}

async function executeAction() {
  if (!pendingAction) return;
  const { rowIndex, action, order } = pendingAction;
  closeConfirmModal();
  await sendAction(rowIndex, action, order, '');
}

/* ── EDIT MODAL ── */
function openEdit(rowIndex) {
  const o = allOrders.find(o => o.rowIndex === rowIndex);
  if (!o) return;
  document.getElementById('eNume').value      = o.nume;
  document.getElementById('eTelefon').value   = o.telefon;
  document.getElementById('eEmail').value     = o.email;
  document.getElementById('eProduse').value   = o.produse;
  document.getElementById('eLivrare').value   = o.livrare;
  document.getElementById('eLocalitate').value= o.localitate;
  document.getElementById('eAdresa').value    = o.adresa;
  document.getElementById('eNota').value      = '';
  document.getElementById('editModal').dataset.rowIndex = rowIndex;
  document.getElementById('editModal').classList.add('open');
}

function closeModal() {
  document.getElementById('editModal').classList.remove('open');
}

async function saveEdit() {
  const rowIndex = +document.getElementById('editModal').dataset.rowIndex;
  const order    = allOrders.find(o => o.rowIndex === rowIndex);
  if (!order) return;

  const updated = {
    ...order,
    produse:    document.getElementById('eProduse').value,
    livrare:    document.getElementById('eLivrare').value,
    localitate: document.getElementById('eLocalitate').value,
    adresa:     document.getElementById('eAdresa').value,
  };
  const nota = document.getElementById('eNota').value.trim();
  closeModal();
  await sendAction(rowIndex, 'edit', updated, nota);
}

/* ── SEND ACTION ── */
async function sendAction(rowIndex, action, order, nota) {
  try {
    const res  = await fetch('/api/admin-action', {
      method:  'POST',
      headers: { 'Authorization': `Bearer ${TOKEN}`, 'Content-Type': 'application/json' },
      body:    JSON.stringify({ rowIndex, action, order, nota }),
    });
    const data = await res.json();
    if (!res.ok) { showToast('Eroare: ' + (data.error || ''), 'error'); return; }

    const msg = action === 'confirm' ? '✅ Comandă confirmată — email trimis!'
              : action === 'cancel'  ? '❌ Comandă anulată — email trimis!'
              :                        '✏️ Comanda a fost actualizată!';
    showToast(msg, action === 'confirm' ? 'success' : action === 'cancel' ? 'error' : '');

    // Update local state
    const idx = allOrders.findIndex(o => o.rowIndex === rowIndex);
    if (idx !== -1) {
      if (action === 'edit') { allOrders[idx] = { ...allOrders[idx], ...order }; }
      else { allOrders[idx].status = action === 'confirm' ? 'Confirmat' : 'Anulat'; }
    }
    renderStats();
    renderTable();
  } catch (e) {
    showToast('Eroare de conexiune', 'error');
  }
}

/* ── TOAST ── */
function showToast(msg, type = '') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className   = 'show ' + type;
  setTimeout(() => { t.className = ''; }, 3500);
}

/* ── INIT ── */
if (TOKEN) {
  showDashboard();
} else {
  document.getElementById('loginScreen').style.display = 'flex';
}
</script>
</body>
</html>
